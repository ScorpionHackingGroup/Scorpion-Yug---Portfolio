<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Majnu X Contents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100dvh;background:#f7f6f3}
body{font-family:'DM Sans',sans-serif;color:#2f3437;line-height:1.6;font-size:1rem}
.page{max-width:26rem;margin:0 auto;min-height:100dvh;padding-bottom:3rem}
.banner{width:100%;height:9rem;object-fit:cover;display:block}
.banner-ph{width:100%;height:6rem;background:linear-gradient(135deg,#11111133,#11111155)}
.hero{padding:1.25rem 1.1rem 0.75rem;display:flex;flex-direction:column;align-items:center;text-align:center;margin-top:-3rem;position:relative}
.ring{width:5.25rem;height:5.25rem;border-radius:50%;border:0.2rem solid #f7f6f3;box-shadow:0 0 0 0.15rem #111111;overflow:hidden;margin-bottom:0.65rem}
.ring img{width:100%;height:100%;object-fit:cover}
h1{font-family:'Playfair Display',serif;font-size:1.4rem;letter-spacing:-0.025em;line-height:1.2;margin-bottom:0.15rem}
.uname{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:#787774;margin-bottom:0.55rem}
.bio{font-size:0.88rem;line-height:1.55;opacity:0.82;max-width:19rem;margin:0 auto 0.7rem}
.meta{display:flex;flex-wrap:wrap;justify-content:center;gap:0.35rem 0.75rem;margin-bottom:1.1rem}
.tag{font-size:0.72rem;color:#787774;display:flex;align-items:center;gap:0.28rem}
.links{padding:0 1rem;display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.25rem}
.lcard{display:flex;align-items:center;justify-content:space-between;padding:0.85rem 1rem;border-radius:0.7rem;text-decoration:none;color:#2f3437;background:rgba(255,255,255,0.82);backdrop-filter:blur(0.8rem);-webkit-backdrop-filter:blur(0.8rem);border:0.0625rem solid rgba(0,0,0,0.07);transition:transform 0.18s;opacity:0;animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards}
.lcard:hover{transform:translateY(-0.1rem)}
.lcard:active{transform:scale(0.97)}
.ltitle{font-weight:500;font-size:0.88rem}
.larrow{opacity:0.38;font-size:0.85rem}
.sec-title{font-family:'JetBrains Mono',monospace;font-size:0.63rem;text-transform:uppercase;letter-spacing:0.09em;color:#787774;margin-bottom:0.65rem;padding:0 1rem}
.socials{padding:0 1rem;margin-bottom:1.5rem}
.s-row{display:flex;flex-wrap:wrap;gap:0.5rem}
.sbtn{display:flex;align-items:center;gap:0.45rem;padding:0.45rem 0.75rem;border-radius:0.45rem;text-decoration:none;font-size:0.78rem;font-weight:500;color:#2f3437;background:rgba(255,255,255,0.82);backdrop-filter:blur(0.8rem);-webkit-backdrop-filter:blur(0.8rem);border:0.0625rem solid rgba(0,0,0,0.07);transition:transform 0.15s;opacity:0;animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards}
.sbtn:hover{transform:translateY(-0.08rem)}
.sbtn:active{transform:scale(0.97)}
.sbtn img{width:0.95rem;height:0.95rem;object-fit:contain;}
.footer{text-align:center;font-size:0.65rem;color:#787774;font-family:'JetBrains Mono',monospace;opacity:0.5;padding:0 1rem}
@keyframes fadeUp{from{opacity:0;transform:translateY(0.6rem)}to{opacity:1;transform:translateY(0)}}
.hero{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both}
</style>
</head>
